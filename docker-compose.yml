version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: lingoalb-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: lingoalb

  backend:
    build: ./backend
    container_name: lingoalb-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/lingoalb
      JWT_SECRET: change_this_secret_in_production
      JWT_REFRESH_SECRET: change_this_refresh_secret
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: lingoalb-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
